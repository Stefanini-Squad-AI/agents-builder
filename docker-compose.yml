# Agents Workshop — Full Stack Docker Compose
#
# This file defines all services needed to run Agents Workshop:
#   - postgres: PostgreSQL 16 database
#   - redis: Redis 7 for Dramatiq job queue
#   - api: FastAPI backend (runs migrations on startup)
#   - worker: Dramatiq background worker
#   - web: Next.js frontend
#
# Usage:
#   docker compose up -d              # start all services
#   docker compose up -d postgres redis  # infrastructure only (dev mode)
#   docker compose ps                 # show status
#   docker compose logs -f api worker # tail API + worker logs
#   docker compose down               # stop containers (keeps volumes)
#   docker compose down -v            # stop + remove data volumes
#
# Scaling workers:
#   docker compose up -d --scale worker=3

services:

  # ═══════════════════════════════════════════════════════════
  # Infrastructure
  # ═══════════════════════════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    container_name: workshop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: workshop
      POSTGRES_USER: workshop
      POSTGRES_PASSWORD: workshop
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - workshop_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workshop -d workshop"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - workshop-net

  redis:
    image: redis:7-alpine
    container_name: workshop-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - workshop_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - workshop-net

  # ═══════════════════════════════════════════════════════════
  # Backend API (FastAPI)
  # ═══════════════════════════════════════════════════════════

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: workshop-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://workshop:workshop@postgres:5432/workshop
      REDIS_URL: redis://redis:6379/0
      WORKSHOP_DATA_DIR: /app/data
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WORKSHOP_DEFAULT_PROVIDER: ${WORKSHOP_DEFAULT_PROVIDER:-anthropic}
      WORKSHOP_DEFAULT_MODEL: ${WORKSHOP_DEFAULT_MODEL:-claude-sonnet-4-5}
      # AWS credentials for Bedrock (optional if mounting ~/.aws)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-2}
    volumes:
      - ./data:/app/data
      # Mount host AWS credentials for boto3 (optional - remove if using env vars)
      - ~/.aws:/root/.aws:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - workshop-net
    profiles:
      - full

  # ═══════════════════════════════════════════════════════════
  # Dramatiq Worker (background jobs)
  # ═══════════════════════════════════════════════════════════

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: workshop-worker
    restart: unless-stopped
    command: ["dramatiq", "app.jobs", "-p", "2", "-t", "4"]
    environment:
      DATABASE_URL: postgresql+psycopg://workshop:workshop@postgres:5432/workshop
      REDIS_URL: redis://redis:6379/0
      WORKSHOP_DATA_DIR: /app/data
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WORKSHOP_DEFAULT_PROVIDER: ${WORKSHOP_DEFAULT_PROVIDER:-anthropic}
      WORKSHOP_DEFAULT_MODEL: ${WORKSHOP_DEFAULT_MODEL:-claude-sonnet-4-5}
      # AWS credentials for Bedrock (optional if mounting ~/.aws)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    volumes:
      - ./data:/app/data
      # Mount host AWS credentials for boto3 (optional - remove if using env vars)
      - ~/.aws:/root/.aws:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - workshop-net
    profiles:
      - full

  # ═══════════════════════════════════════════════════════════
  # Frontend (Next.js)
  # ═══════════════════════════════════════════════════════════

  web:
    build:
      context: ./packages/web
      dockerfile: ../../docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: workshop-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - workshop-net
    profiles:
      - full

# ═══════════════════════════════════════════════════════════
# Networks & Volumes
# ═══════════════════════════════════════════════════════════

networks:
  workshop-net:
    name: workshop-net

volumes:
  workshop_pg_data:
    name: workshop_pg_data
  workshop_redis_data:
    name: workshop_redis_data
