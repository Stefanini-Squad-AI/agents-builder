# Alembic config for workshop-core.
#
# The database URL is intentionally NOT set here. It is read from app.settings
# (which itself reads from .env / env vars) inside alembic/env.py, so a single
# source of truth (DATABASE_URL) drives both the app and migrations.
#
# Run migrations from this package directory:
#   cd packages/core
#   uv run alembic upgrade head
#   uv run alembic revision --autogenerate -m "describe change"

[alembic]
script_location = alembic
prepend_sys_path = .
# We use timestamped, descriptive revision IDs for readability.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s
truncate_slug_length = 60
timezone = UTC

# sqlalchemy.url is set programmatically in env.py from Settings.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
