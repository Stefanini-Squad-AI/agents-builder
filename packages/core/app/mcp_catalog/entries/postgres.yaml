key: postgres
name: PostgreSQL
description: Query PostgreSQL databases, inspect schemas, and run read-only SQL
vendor: postgresql
category: database
run_command: "npx @modelcontextprotocol/server-postgres"
documentation_url: "https://github.com/modelcontextprotocol/servers/tree/main/src/postgres"
icon: postgresql

env_vars:
  DATABASE_URL:
    required: true
    secret: true
    label: "Database Connection URL"
    hint: "postgresql://user:password@host:5432/database"

config_fields:
  schema:
    type: string
    required: false
    label: "Default Schema"
    hint: "Optional — defaults to 'public'"
    default: "public"
  read_only:
    type: boolean
    required: false
    label: "Read-Only Mode"
    hint: "Restrict to SELECT queries only (recommended)"
    default: "true"

tools:
  - name: query
    description: Execute a SQL query and return results
    risk_level: N2
  - name: list_tables
    description: List all tables in the schema
    risk_level: N1
  - name: describe_table
    description: Get column definitions for a table
    risk_level: N1
  - name: list_schemas
    description: List all schemas in the database
    risk_level: N1
  - name: get_table_stats
    description: Get row counts and size statistics
    risk_level: N1

requires_approval: false
