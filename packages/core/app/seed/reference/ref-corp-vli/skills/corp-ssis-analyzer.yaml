slug: corp-ssis-analyzer
name: CORP SSIS Package Analyzer
description: |
  Analyze SSIS packages (.dtsx XML) to produce a three-level output:
  business flow summary, data flow diagram, execution mode breakdown,
  task inventory, and SQL-level detail. Use when the user provides
  .dtsx content, SSIS XML, or pasted package content, or asks for an
  overview of an SSIS project, control flow, variables, precedence
  constraints, or wants to prepare a migration to Databricks / Spark
  / Airflow / dbt.
kind: analyzer
body: |
  # SSIS Package Analyzer

  Output must serve three audiences in order: business stakeholders,
  architects, engineers. Always produce all three levels.

  ## Section 0 — Package inventory (always first)

  - Package identity: `DTS:ObjectName`, creation date, locale.
  - Task type census: every `DTS:ExecutableType`, count, enabled count.
  - Variable inventory: every `DTS:Variable`, including
    `EvaluateAsExpression` and the full expression for expression-driven ones.
  - Connection managers: name, server, database, auth method, role
    (Source / Target / Both / Control). Connection strings parsed from
    `DTS:ObjectData`. Flag DSN-only or expression-only connections as
    BLOCKERS until resolved.
  - Change-history indicator: count `AnnotationLayout` blocks.

  ## Section 1 — Business flow summary

  One paragraph. Plain language. No SQL. Answers: what business process
  does this serve, what real-world operation it tracks, what breaks
  downstream if it fails, who consumes the output.

  ## Section 2 — Data flow diagram

  Text-based node graph. Sources -> transforms -> targets. Derive every
  node from the package XML; don't add nodes from common patterns alone.

  ## Section 3 — Execution modes

  Find every mode-controlling variable (look for `EvaluateAsExpression=True`
  or any expression in a precedence constraint with `DTS:EvalOp="3"`).
  Quote each expression verbatim. Build a comparison table of modes
  from evidence only — never from assumption.

  ## Section 4 — Task inventory

  Active tasks first, disabled tasks separately. For every disabled task,
  classify via the framework in `resources/disabled-task-audit.md`. No
  task may remain UNKNOWN at handoff.

  ## Section 5 — SQL-level analysis

  For each active task's SQL:
  - Hard filters (WHERE clauses) — note what they silently exclude.
  - Deduplication logic (ROW_NUMBER / DISTINCT / GROUP BY) — partition
    and order keys separately.
  - Join strategy — INNER vs LEFT, flag changes from history.
  - Temporal logic (DATEADD / DATEDIFF) — exact values; flag any comment
    that disagrees with the code.
  - Fallback chains (ISNULL / COALESCE / CASE) — document each level
    and what sentinel values (e.g. -2) mean downstream.

  ## Section 6-9 — predecessors, change history, profiling, blockers

  See resources/ for templates per section. Section 9 lists migration
  readiness blockers + their owners.

  ## Rules

  - Never skip Sections 1-3 to get to SQL faster.
  - Distinguish facts (prefix `Found in [task]:`) from inferences
    (prefix `Inferred:`).
  - Quote SQL verbatim from `SQLTask:SqlStatementSource` — never paraphrase.
  - Disabled tasks are never silently ignored.
  - A comment that disagrees with code is a bug until proven otherwise.

  ## When to pull in sibling skills

  - Once tasks are catalogued -> `corp-rule-extractor` for the rule catalog.
  - When the migration plan needs to be built -> `corp-databricks-planner`.
resources:
  - filename: extraction-checklist.md
    language: markdown
    content: |
      # SSIS Extraction Checklist

      Complete before handoff to the migration planner.

      - [ ] Package identity confirmed
      - [ ] All task types enumerated (not just ExecuteSQLTask)
      - [ ] Every non-ExecuteSQLTask type has a handling note
      - [ ] Variable inventory complete
      - [ ] Expression variables quoted verbatim
      - [ ] Every connection manager has server + database + auth + role
      - [ ] DSN / expression connections flagged as blockers
      - [ ] AnnotationLayout count recorded
      - [ ] Every disabled task classified (no UNKNOWN)
      - [ ] data-quality-profiling.sql executed and attached
      - [ ] Section 9 blockers list has owners
  - filename: disabled-task-audit.md
    language: markdown
    content: |
      # Disabled Task Audit

      Categories:

      | Category | Heuristic | Action |
      |---|---|---|
      | Superseded | Newer task does the same job | Document, exclude from migration |
      | Accidental | No newer replacement; was working recently | Investigate; likely re-enable |
      | Dead code | Not referenced in change log; predates pivots | Drop from migration |
      | Unknown | None of the above clearly applies | Escalate to SME (blocker) |

      Every disabled task must end up in one of the first three by
      handoff. UNKNOWN is a migration blocker.
