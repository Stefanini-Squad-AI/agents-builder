  - filename: comparison-checklist.md
    language: markdown
    content: |
      # Rule Comparison Checklist

      Use this checklist for each rule when comparing source to target.

      ## Logic Equivalence
      - [ ] IF/THEN/ELSE structure matches
      - [ ] Comparison operators match (=, >, <, >=, <=, <>)
      - [ ] Boolean combinations match (AND, OR, NOT)
      - [ ] NULL handling equivalent (ISNULL vs COALESCE acceptable if behavior same)
      - [ ] Short-circuit evaluation doesn't change outcome

      ## Data Mapping
      - [ ] Source table → Target table documented
      - [ ] Source column → Target column documented
      - [ ] Data types compatible (or transformation documented)
      - [ ] Value translations documented (code mappings)
      - [ ] New columns justified (not in source)

      ## Calculation Equivalence
      - [ ] Formula mathematically equivalent
      - [ ] Rounding/precision matches
      - [ ] Order of operations preserved
      - [ ] Aggregation logic matches (SUM/AVG/COUNT/etc.)
      - [ ] Division by zero handling matches

      ## Temporal Logic
      - [ ] Date/time comparisons use same basis
      - [ ] Time zone handling consistent
      - [ ] Magic numbers match (e.g., "7 hours")
      - [ ] Date arithmetic produces same results
      - [ ] Boundary conditions (midnight, month-end) match

      ## Edge Cases
      - [ ] NULL input → same output
      - [ ] Empty string input → same output
      - [ ] Zero input → same output
      - [ ] Maximum value → same output
      - [ ] Minimum value → same output
      - [ ] Boundary values → same output

      ## Behavioral Verification
      - [ ] Test data produces identical output
      - [ ] Production-like volume tested
      - [ ] Performance acceptable
      - [ ] Error conditions handled equivalently

