      # Compliance Entry Template

      Copy one block per rule from the catalog.

      ---

      ## [BR-xxx] {rule_title}

      ### Compliance Status
      
      | Aspect | Status |
      |--------|--------|
      | **Overall** | ✅ Implemented / ⚠️ Partial / ❌ Missing / 🔄 Modified |
      | **Logic** | ✅ / ⚠️ / ❌ |
      | **Data** | ✅ / ⚠️ / ❌ |
      | **Behavior** | ✅ / ⚠️ / ❌ |

      ### Source Implementation

      **Location**: `{source_file}:{line_range}`

      ```sql
      -- Source code excerpt
      {paste relevant code}
      ```

      ### Target Implementation

      **Location**: `{target_file}:{line_range}`

      ```python
      # Target code excerpt
      {paste relevant code}
      ```

      ### Comparison Analysis

      | Aspect | Source | Target | Match |
      |--------|--------|--------|-------|
      | Filter condition | `status != 'DEL'` | `status != 'DEL'` | ✅ |
      | NULL handling | ISNULL → 0 | COALESCE → 0 | ✅ |
      | {aspect} | {source} | {target} | {✅/⚠️/❌} |

      ### Test Validation

      | Test ID | Input | Source Result | Target Result | Match |
      |---------|-------|---------------|---------------|-------|
      | TC-001 | {input} | {result} | {result} | ✅/❌ |

      ### Deviations (if any)

      | Aspect | Source Behavior | Target Behavior | Impact | Approved |
      |--------|-----------------|-----------------|--------|----------|
      | {what} | {old} | {new} | {impact} | ✅ {approver} {date} / ❌ Pending |

      ### Open Issues

      - [ ] {Issue to resolve}

