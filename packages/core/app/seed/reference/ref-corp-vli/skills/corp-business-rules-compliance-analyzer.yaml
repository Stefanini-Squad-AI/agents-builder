slug: corp-business-rules-compliance-analyzer
name: Business Rules Compliance Analyzer
description: |
  Compare a business rules catalog against target implementation to verify 
  compliance, find gaps, and document deviations. Use when validating 
  migration completeness, auditing code against specifications, verifying 
  refactored code preserves original logic, or preparing UAT compliance 
  reports for stakeholder sign-off.
kind: analyzer
body: |
  # Business Rules Compliance Analyzer

  After rules are discovered and cataloged, this skill verifies they are 
  correctly implemented in the target system. It produces a compliance 
  report suitable for UAT sign-off.

  ## Output Structure

  ### Section 1 — Executive Summary

  ```
  COMPLIANCE SUMMARY
  ----
  Total rules in catalog:      N
  ✅ Fully implemented:        N (X%)
  ⚠️ Partially implemented:   N (X%)
  ❌ Missing:                  N (X%)
  🔄 Intentionally modified:  N (X%)
  ⚡ New (not in source):      N (X%)
  ----
  BLOCKING ISSUES: N rules require resolution before release
  ```

  ### Section 2 — Coverage by Category

  | Category | Total | ✅ | ⚠️ | ❌ | Notes |
  |----------|-------|---|----|----|-------|
  | Validation | N | N | N | N | |
  | Calculation | N | N | N | N | |
  | ... | | | | | |

  ### Section 3 — Rule-by-Rule Analysis

  One entry per rule following `resources/compliance-entry-template.md`.

  ### Section 4 — Gap Analysis Matrix

  Shows which components implement which rules. See 
  `resources/gap-analysis-matrix.md`.

  ### Section 5 — Accepted Deviations

  Rules intentionally changed, with approval records.

  ### Section 6 — Blocking Issues

  Rules that MUST be fixed before release.

  ## Comparison Checklist

  For each rule, verify using `resources/comparison-checklist.md`:

  1. **Logic equivalence** — Same conditions produce same outcomes
  2. **Data mapping** — Source columns correctly map to target
  3. **Calculation accuracy** — Formulas produce identical results
  4. **Temporal behavior** — Time-based rules use same basis
  5. **Edge case handling** — NULL, empty, boundary conditions match

  ## Compliance Statuses

  | Status | Meaning | Action Required |
  |--------|---------|-----------------|
  | ✅ Implemented | Rule works identically | None |
  | ⚠️ Partial | Some aspects missing | Document gaps |
  | ❌ Missing | Not implemented | Fix or get deviation approved |
  | 🔄 Modified | Intentionally different | Get approval on record |
  | ⚡ New | Added in target, not in source | Document rationale |
  | 🔍 Unknown | Cannot determine | Investigate |

  ## Deviation Approval Process

  When a rule is intentionally changed:

  1. Document source behavior vs. target behavior
  2. Explain business rationale for change
  3. Assess impact on downstream systems
  4. Get written approval from business owner
  5. Record approver, date, and approval reference

  ## Rules for This Skill

  1. **Every rule must have a status** — No rule left as "Unknown" at handoff
  2. **Evidence both sides** — Show source AND target implementation
  3. **Test, don't assume** — Run test cases to verify behavior match
  4. **Document deviations** — Approved changes are acceptable; undocumented are not
  5. **Track blocking issues** — Missing critical rules block release

  ## When to Flag as Blocking

  - Critical business rule is missing
  - Calculation produces different results
  - Data integrity rule not enforced
  - Compliance-related rule absent
  - No workaround exists

