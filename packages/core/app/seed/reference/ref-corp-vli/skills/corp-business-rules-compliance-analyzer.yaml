      | ✅ | Rule fully implemented |
      | ⚠️ | Partially implemented |
      | ❌ | Missing (should be here) |
      | ➖ | Not applicable |
      | 🔍 | Needs investigation |

      ## Matrix

      | Rule ID | Rule Name | Bronze | Silver | Gold | API | Notes |
      |---------|-----------|--------|--------|------|-----|-------|
      | BR-VAL-001 | {name} | ➖ | ✅ | ✅ | ➖ | |
      | BR-CAL-001 | {name} | ➖ | ⚠️ | ✅ | ➖ | Silver missing rounding |
      | BR-WF-001 | {name} | ➖ | ➖ | ❌ | ✅ | Gold needs this |

      ## Summary by Component

      ### Bronze Layer
      - **Purpose**: Raw ingestion
      - **Rules implemented**: N
      - **Rules N/A**: N
