# Agents Workshop — Tech Panorama catalog.
#
# Loaded by `seed.seeder.seed_tech_catalog()` into `tech_dimensions` and
# `tech_items`. Each item gets a deterministic slug (kebab-case of name) and
# a small `tags` list used for filtering in the picker.
#
# Re-running the seeder is idempotent: dimensions and items are upserted by
# (dimension.slug) and (dimension_id, item.slug).

dimensions:
  - slug: languages
    name: Linguagens
    description: Programming languages targeted by this project (or being migrated from).
    order: 1
    items:
      - { slug: python,     name: Python,                   tags: [scripting, async, ml, backend] }
      - { slug: java,       name: Java,                     tags: [enterprise, jvm, backend] }
      - { slug: javascript, name: JavaScript,               tags: [web, frontend, backend] }
      - { slug: typescript, name: TypeScript,               tags: [web, frontend, backend, typed] }
      - { slug: csharp,     name: "C# (.NET 9)",            tags: [dotnet, enterprise, backend] }
      - { slug: sql,        name: SQL,                      tags: [database, query] }
      - { slug: plsql,      name: PL/SQL,                   tags: [oracle, database, procedural] }

