[project]
name = "workshop-core"
version = "0.1.0"
description = "FastAPI + Dramatiq + LLM + template-family core for Agents Workshop"
readme = "README.md"
requires-python = ">=3.12,<3.13"
authors = [{ name = "Agents Workshop" }]

# Runtime dependencies are added progressively as implementation steps land.
# Empty in Step 0.1 by design; expanded in 0.3 (FastAPI), 0.4 (SQLAlchemy + Alembic),
# 0.9 (Dramatiq), 0.10 (extractors), 1.3 (Anthropic), etc.
dependencies = [
    "alembic>=1.18.4",
    "anthropic>=0.40.0",
    "boto3>=1.35.0",
    "dramatiq[redis]>=2.1.0",
    "fastapi>=0.136.1",
    "httpx>=0.28.1",
    "markitdown[docx,pdf]>=0.1.5",
    "openai>=1.59.0", 
    "pdfplumber>=0.11.9",
    "psycopg[binary]>=3.3.4",
    "pydantic-settings>=2.14.1",
    "python-multipart>=0.0.28",
    "redis>=7.4.0",
    "sqlalchemy[asyncio]>=2.0",
    "structlog>=25.5.0",
    "uvicorn[standard]>=0.46.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]

[dependency-groups]
dev = [
    "pytest-asyncio>=1.3.0",
    "python-docx>=1.2.0",
    "reportlab>=4.5.0",
]
