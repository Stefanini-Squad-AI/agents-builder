[project]
name = "workshop-core"
version = "0.1.0"
description = "FastAPI + Dramatiq + LLM + template-family core for Agents Workshop"
readme = "README.md"
requires-python = ">=3.12,<3.13"
authors = [{ name = "Agents Workshop" }]

# Runtime dependencies are added progressively as implementation steps land.
# Empty in Step 0.1 by design; expanded in 0.3 (FastAPI), 0.4 (SQLAlchemy + Alembic),
# 0.9 (Dramatiq), 0.10 (extractors), 1.3 (Anthropic), etc.
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]
