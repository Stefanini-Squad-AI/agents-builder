[project]
name = "workshop-cli"
version = "0.1.0"
description = "Typer CLI for Agents Workshop"
readme = "README.md"
requires-python = ">=3.12,<3.13"
authors = [{ name = "Agents Workshop" }]

# The CLI depends on the core package via the uv workspace.
# Additional deps (typer, rich) land at Step 0.6.
dependencies = [
    "httpx>=0.28.0",
    "rich>=15.0.0",
    "typer>=0.25.1",
    "workshop-core",
]

[tool.uv.sources]
workshop-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["workshop"]

[project.scripts]
workshop = "workshop.__main__:app"
