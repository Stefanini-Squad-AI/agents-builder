[project]
name = "workshop-cli"
version = "0.1.0"
description = "Typer CLI for Agents Workshop"
readme = "README.md"
requires-python = ">=3.12,<3.13"
authors = [{ name = "Agents Workshop" }]

# The CLI depends on the core package via the uv workspace.
# Additional deps (typer, rich) land at Step 0.6.
dependencies = [
    "workshop-core",
]

[tool.uv.sources]
workshop-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["workshop"]

# The `workshop` console script is wired in Step 0.6 once __main__:app exists.
# [project.scripts]
# workshop = "workshop.__main__:app"
